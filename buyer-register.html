<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Farmers Father | Buyer Auth</title>
<link rel="stylesheet" href="buyer-register.css">
</head>

<body>

<div class="container" id="container">

  <!-- REGISTER -->

  <div class="form-container register-container">

    <form id="registerForm">

      <h2>Buyer Registration</h2>

      <div class="input-group">
        <input type="text" id="regName" placeholder="Full Name" required>
      </div>
      

      <div class="input-group">
        <input type="tel" id="regPhone" placeholder="Phone Number" required>
      </div>

      <div class="input-group">
        <input type="email" id="regEmail" placeholder="Email Address" required>
      </div>

      <div class="input-group">
        <input type="password" id="regPassword" placeholder="Password" required>
      </div>

      <button class="btn" type="submit">
        Register
      </button>

    </form>

  </div>

  <!-- LOGIN -->

  <div class="form-container login-container">

    <form id="loginForm">

      <h2>Buyer Login</h2>

      <div class="input-group">
        <input type="tel" id="loginPhone" placeholder="Phone Number" required>
      </div>

      <div class="input-group">
        <input type="password" id="loginPassword" placeholder="Password" required>
      </div>

      <button class="btn" type="submit">
        Login
      </button>

      <p class="small-text">
        Login to browse and contact farmers
      </p>

    </form>

  </div>

  <!-- OVERLAY -->

  <div class="overlay-container">

    <div class="overlay-content">

      <h1>Farmers Father</h1>

      <p id="overlayText">
        New buyer? Register and start connecting directly with farmers.
      </p>
<a  href="index.html" class="home">Go Home</a>
      <button class="switch-btn" id="switchBtn">
        Register
      </button>

    </div>

  </div>

</div>
<script src="buyer-register.js"></script>
</body>
</html>
