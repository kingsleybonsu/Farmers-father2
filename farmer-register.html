<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Farmers Father | Farmer Authentication</title>
    <link rel="stylesheet" href="farmer-register.css" />
  </head>

  <body>
    <div class="container" id="container">
      <!-- REGISTER -->
      <div class="form-container register-container">
        <form id="registerForm">
          <h2>Farmer Register</h2>
          <div class="input-group">
            <input type="text" id="regName" placeholder="Full Name" required />
          </div>

          <div class="input-group">
            <input type="text" id="farmName" placeholder="Farm Name" required />
          </div>

          <div class="input-group">
            <input
              type="tel"
              id="regPhone"
              placeholder="Phone Number 233..."
              required
            />
          </div>

          <div class="input-group">
            <input
              type="email"
              id="regEmail"
              placeholder="Email Address"
              required
            />
          </div>

          <div class="input-group">
            <input
              type="password"
              id="regPassword"
              placeholder="Password"
              required
            />
          </div>

          <button type="submit" class="btn">Register</button>

          <p class="small-text">Create account to start selling produce</p>
        </form>
      </div>

      <!-- LOGIN -->
      <div class="form-container login-container">
        <form id="loginForm">
          <h2>Farmer Login</h2>

          <div class="input-group">
            <input
              type="tel"
              id="loginPhone"
              placeholder="Phone Number"
              required
            />
          </div>

          <div class="input-group">
            <input
              type="password"
              id="loginPassword"
              placeholder="Password"
              required
            />
          </div>

          <button type="submit" class="btn">Login</button>

          <p class="small-text">Login to access your dashboard</p>
        </form>
      </div>

      <!-- GREEN OVERLAY -->
      <div class="overlay-container">
        <div class="overlay-content">
          <h1>Farmers Father</h1>

          <p id="overlayText">
            Don't have an account yet? Register as a farmer and start selling
            produce.
          </p>

          <a href="index.html" class="home">Go Home</a>

          <button class="switch-btn" id="switchBtn">Register</button>
        </div>
      </div>
    </div>
    <script src="farmer-register.js"></script>
  </body>
</html>
