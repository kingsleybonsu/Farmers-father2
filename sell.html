<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sell Produce | Farmers Father</title>
  <link rel="stylesheet" href="sell.css">
</head>

<body>

  <!-- HEADER -->
  <header class="header">
    <nav class="nav container">
      <a href="index.html" class="logo">Farmers Father</a>
      <a href="index.html" class="back-link">Back to Home</a>
    </nav>
  </header>

  <!-- PAGE TITLE -->
  <section class="page-title container">
    <h1>Sell Your Produce</h1>
    <p>List your farm produce and connect directly with buyers.</p>
  </section>

  <!-- FORM -->
  <section class="form-section container">
    <form class="form">

      <div class="form-group">
        <label>Farmer Name</label>
        <input type="text" placeholder="e.g. Kofi Mensah" />
      </div>

      <div class="form-group">
        <label>Produce Name</label>
        <input type="text" placeholder="e.g. Tomatoes" />
      </div>

      <div class="form-group">
        <label>Quantity</label>
        <input type="text" placeholder="e.g. 50 crates" />
      </div>

      <div class="form-group">
        <label>Location</label>
        <input type="text" placeholder="e.g. Ashanti Region" />
      </div>

      <div class="form-group">
        <label>Phone / WhatsApp Number</label>
        <input type="tel" placeholder="e.g. 0535901446" />
      </div>

      <div class="form-group">
        <label>Price (optional)</label>
        <input type="text" placeholder="e.g. GHS 200 per crate" />
      </div>

      <div class="form-group">
        <label>Date</label>
        <input type="date" />
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" placeholder="e.g. example@gmail.com" />
      </div>

      <button type="submit" class="btn-submit">
        Submit Produce
      </button>

    </form>
  </section>

  <!-- FOOTER -->
  <footer class="footer">
    <p>Farmers Father — Helping farmers sell before food spoils 🇬🇭</p>
  </footer>

</body>
</html>
