<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sell Produce | Farmers Father</title>
  <link rel="stylesheet" href="sell.css">
</head>

<body>

<!-- ===== HEADER ===== -->
<header class="header">
  <div class="container nav">

    <h1 class="logo">Farmers Father</h1>

    <input type="checkbox" id="menu-toggle">
    <label for="menu-toggle" class="menu-icon">☰</label>

    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="browse.html">Browse</a>
    </div>

  </div>
</header>

<!-- ===== PAGE TITLE ===== -->
<section class="page-title container">
  <h1>Sell Your Produce</h1>
  <p>List your farm produce and connect directly with buyers.</p>
</section>

<!-- ===== FORM ===== -->
<section class="form-section container">
  <form class="form" id="sellForm">

    <div class="form-group">
      <label>Farmer Name</label>
      <input type="text" id="farmer" required />
    </div>

    <div class="form-group">
      <label>Produce Name</label>
      <input type="text" id="name" required />
    </div>

    <div class="form-group">
      <label>Quantity</label>
      <input type="text" id="quantity" required />
    </div>

    <div class="form-group">
      <label>Location</label>
      <input type="text" id="location" required />
    </div>

    <div class="form-group">
      <label>Category</label>
      <select id="category">
        <option value="Vegetables">Vegetables</option>
        <option value="Fruits">Fruits</option>
        <option value="Livestock">Livestock</option>
      </select>
    </div>

    <div class="form-group">
      <label>Phone / WhatsApp Number</label>
      <input type="tel" id="phone" required />
    </div>

    <div class="form-group">
      <label>Price</label>
      <input type="text" id="price" placeholder="Optional" />
    </div>

    <div class="form-group">
      <label>Date</label>
      <input type="date" id="date" />
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" />
    </div>

    <!-- IMAGE UPLOAD -->
    <div class="form-group">
      <label>Upload Product Image</label>
      <input type="file" id="image" accept="image/*" required />
    </div>

    <!-- IMAGE PREVIEW -->
    <div class="image-preview">
      <img id="preview" src="" alt="Preview" style="display:none;">
    </div>

    <button type="submit" class="btn-submit">
      Submit Produce
    </button>

  </form>
</section>

<!-- ===== FOOTER ===== -->
<footer class="footer">
  <p>Farmers Father — Helping farmers sell before food spoils 🇬🇭</p>
</footer>

<!-- ===== JAVASCRIPT ===== -->
<script>
const farmerLoggedIn = localStorage.getItem("farmerLoggedIn");

if (!farmerLoggedIn) {
  alert("Please login as farmer first");
  window.location.href = "farmer-login.html";
}

const form = document.getElementById("sellForm");
const imageInput = document.getElementById("image");
const preview = document.getElementById("preview");

// ===== IMAGE PREVIEW =====
imageInput.addEventListener("change", function() {
  const file = this.files[0];

  if (file) {
    const reader = new FileReader();

    reader.onload = function() {
      preview.src = reader.result;
      preview.style.display = "block";
    };

    reader.readAsDataURL(file);
  }
});

// ===== FORM SUBMIT =====
form.addEventListener("submit", function(e) {
  e.preventDefault();

  const file = imageInput.files[0];

  if (!file) {
    alert("Please upload an image");
    return;
  }

  const reader = new FileReader();

  reader.onload = function() {

    const product = {
      id: Date.now(), // unique ID
      farmer: document.getElementById("farmer").value,
      name: document.getElementById("name").value,
      quantity: document.getElementById("quantity").value,
      location: document.getElementById("location").value,
      category: document.getElementById("category").value,
      phone: document.getElementById("phone").value,
      price: document.getElementById("price").value,
      date: document.getElementById("date").value,
      email: document.getElementById("email").value,
      image: reader.result
    };

    let products = JSON.parse(localStorage.getItem("products")) || [];

    products.push(product);

    localStorage.setItem("products", JSON.stringify(products));

    alert("✅ Product added successfully!");

    form.reset();
    preview.style.display = "none";
  };

  reader.readAsDataURL(file);
});
</script>

</body>
</html>
